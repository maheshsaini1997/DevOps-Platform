apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-image-updater
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argocd-image-updater
    targetRevision: 0.9.1
  
    helm:
      values: |
        config:
          registries:
            - name: ECR
              api_url: https://api.ecr.us-east-1.amazonaws.com
              prefix: 530467655811.dkr.ecr.us-east-1.amazonaws.com
              credentials: ext:/app/config/registries.conf
    
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true