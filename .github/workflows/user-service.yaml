name: User Service CI

on:
    push:
        branches: [ "main" ]
        paths:
            - 'application-microservices/user-service/**'
    pull_request:
        branches: [ "main" ]
        paths:
            - 'application-microservices/user-service/**'

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        
        - name: Set image tag
          run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
        
        - name: Build Docker image
          run: |
            cd application-microservices/user-service
            docker build -t user-service:${{ env.IMAGE_TAG }} .