name: Payment Service CI

on:
    push:
        branches: [ "main" ]
        paths:
            - 'application-microservices/payment-service/**'
    pull_request:
        branches: [ "main" ]
        paths:
            - 'application-microservices/payment-service/**'

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        
        - name: Set image tag
          run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
        
        - name: Build Docker image
          run: |
            cd application-microservices/payment-service
            docker build -t payment-service:${{ env.IMAGE_TAG }} .
        
        - name: Print image info (simulation of push)
          run: |
            echo "Build image: payment-service:${{ env.IMAGE_TAG }}"

        - name: Print image info (only on main)
            if github.ref == 'refs/heads/main'
          run: |
            echo "Ready to push: payment-service:${{ env.IMAGE_TAG }}"