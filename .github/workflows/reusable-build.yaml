name: Reusable Build

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Get AWS Account ID
        id: aws-account
        run: |
          echo "ACCOUNT_ID=$(
          aws sts get-caller-identity --query Account --output text
          )" >> $GITHUB_ENV

      - name: Set ECR Repo URL
        run: |
          echo "ECR_REGISTRY=${ACCOUNT_ID }.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com" >> $GITHUB_ENV
          echo "ECR_REPO=dev-${{ inputs.service_name }}" >> $GITHUB_ENV
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | 
          docker login --username AWS --password-stdin $ECR_REGISTRY
      
      - name: Build Docker image
        run: |
          cd ${{ inputs.service_path }}
          docker build -t ${{ inputs.service_name }}:${{ env.IMAGE_TAG }} .
      
      - name: Tag image for ECR
        run: |
          docker tag ${{ inputs.service_name }}:${{ env.IMAGE_TAG }} $ECR_REGISTRY/$ECR_REPO:${{ env.IMAGE_TAG }}
      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.service_name }}:${{ env.IMAGE_TAG }}
          format: 'table'
          exit-code: '1'
          severity: CRITICAL
      - name: Push image to ECR
        run: |
          docker push $ECR_REGISTRY/$ECR_REPO:${{ env.IMAGE_TAG }}

      - name: Print image info
        run: |
          echo "Build image: ${{ inputs.service_name }}:${{ env.IMAGE_TAG }}"