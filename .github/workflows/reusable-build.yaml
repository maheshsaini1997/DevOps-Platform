name: Reusable Build

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region --region $AWS_REGION | 
          docker login --username AWS --password-stdin 384511757320.dkr.ecr.us-east-1.amazonaws.com
      
      - name: Build Docker image
        run: |
          cd ${{ inputs.service_path }}
          docker build -t ${{ inputs.service_name }}:${{ env.IMAGE_TAG }} .
      
      - name: Tag image for ECR
        run: |
          docker tag ${{ inputs.service_name }}:${{ env.IMAGE_TAG }} 384511757320.dkr.ecr.us-east-1.amazonaws.com/dev-${{ inputs.service_name }}:${{ env.IMAGE_TAG }}
      
      - name: Push image to ECR
        run: |
          docker push 384511757320.dkr.ecr.us-east-1.amazonaws.com/dev-${{ inputs.service_name }}:${{ env.IMAGE_TAG }}

      - name: Print image info
        run: |
          echo "Build image: ${{ inputs.service_name }}:${{ env.IMAGE_TAG }}"